# Render: Dashboard → New → Blueprint → اختر المستودع
services:
  - type: web
    name: clinic-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run db:seed && node dist/main.js
    healthCheckPath: /api/public/booking/config
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./data/prod.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: PORT
        value: 4000
      - key: UPLOAD_DIR
        value: ./uploads
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
